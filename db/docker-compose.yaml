services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: onlineshop
    ports:
      - "5432:5432"
    volumes:
      - online-shop-postgres-volume:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - online-shop-redis-volume:/data
volumes:
  online-shop-postgres-volume:
  online-shop-redis-volume:

